pointcloud_to_laserscan:
  ros__parameters:
    target_frame: base_link
    transform_tolerance: 0.08
    min_height: -0.45
    max_height: 0.25
    angle_min: -3.14159
    angle_max: 3.14159
    angle_increment: 0.0122
    scan_time: 0.1
    range_min: 0.35
    range_max: 24.0
    use_inf: true
    inf_epsilon: 1.0
    queue_size: 50
    qos_overrides:
      /scan:
        publisher:
          reliability: reliable
          durability: volatile
          history: keep_last
          depth: 10
